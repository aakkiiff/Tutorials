---
- hosts: test
  become: false
  gather_facts: true

  tasks:
    - name: Show hostname
      debug:
        msg: "this is demo debug commanmd"
    - name: Print all facts
      debug:
        var: ansible_facts

    - name: Show OS family
      debug:
        msg: "The OS family is {{ ansible_os_family }}"

    - name: Show IP address
      debug:
        msg: "The primary IP is {{ ansible_default_ipv4.address }}"
